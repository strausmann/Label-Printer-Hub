# 24mm — full layout.
# A-Diagnose Fix: Canvas 256px→128px. scale_y=128/256=0.500.
# QR 110px (y=8: 8+110=118 < 128). Text-Y proportional skaliert.
# 3-Zeilen-Layout (primary+title+secondary) in 128px.
schema_version: 1
id: grocy-24mm
name: "Grocy Product (24mm)"
app: grocy
tape_mm: 24
printer_model: ptouch
elements:
  - { type: qr,   x: 8,   y: 8,  size: 110, data_field: qr_payload }
  - { type: text, x: 128, y: 8,  field: primary_id, font_size: 28 }
  - { type: text, x: 128, y: 48, field: title,      font_size: 18 }
  - { type: text, x: 128, y: 86, field: secondary,  font_size: 13 }
preview_sample:
  primary_id: "Erdbeermarmelade"
  title: "Lager > Vorrat"
  qr_payload: "https://grocy.example.com/stock/products/47"
  secondary: ["MHD 2027-04-30", "3 Glaeser"]
