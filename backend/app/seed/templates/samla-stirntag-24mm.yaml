# Samla Stirntag — 24mm Endlostape (TZe-251)
# Für IKEA Samla Behälter: Stirnseiten-Etikett mit QR + Standort-ID + Titel.
# ptouch PT-P750W 180 DPI: 24mm = 128 print_pins (Tape24mm).
# QR 110px (y=8: 8+110=118 < 128). Großes Layout für gut lesbare Tags.
schema_version: 1
id: samla-stirntag-24mm
name: "Samla Stirntag (TZe 24mm)"
app: null
tape_mm: 24
printer_model: ptouch
elements:
  - { type: qr,   x: 8,   y: 8,  size: 110, data_field: qr_payload }
  - { type: text, x: 128, y: 8,  field: primary_id, font_size: 24 }
  - { type: text, x: 128, y: 60, field: title,      font_size: 16 }
preview_sample:
  primary_id: "HH-AK-SM01-D2-S1"
  title: "Samla 11L Stirntag"
  qr_payload: "https://hangar.example.test/loc/HH-AK-SM01-D2-S1"
