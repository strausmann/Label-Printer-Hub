# ============================================================================
# Label Printer Hub — Traefik
# Assumes a Traefik instance with HTTPS and a "letsencrypt" certresolver
# is already running, attached to a docker network called "traefik".
# ============================================================================

services:
  label-printer-hub:
    image: ghcr.io/strausmann/label-printer-hub:latest
    container_name: label-printer-hub
    user: "1000:1000"
    networks:
      - traefik
    environment:
      - PRINTERS=${PRINTERS}
      - SNMP_COMMUNITY=${SNMP_COMMUNITY:-public}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/printer-hub.db}
      - WEBHOOK_API_KEY=${WEBHOOK_API_KEY}
      - UI_BASE_URL=https://${PRINTERHUB_HOST}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    labels:
      - "traefik.enable=true"

      # Main UI (you may add a forward-auth middleware like Authelia here)
      - "traefik.http.routers.printerhub.rule=Host(`${PRINTERHUB_HOST}`)"
      - "traefik.http.routers.printerhub.entrypoints=websecure"
      - "traefik.http.routers.printerhub.tls.certresolver=letsencrypt"
      - "traefik.http.routers.printerhub.service=printerhub"
      # Optional: enable an existing forward-auth middleware
      # - "traefik.http.routers.printerhub.middlewares=authelia@docker"

      # Webhook subroute (no SSO/auth — uses WEBHOOK_API_KEY)
      - "traefik.http.routers.printerhub-webhooks.rule=Host(`${PRINTERHUB_HOST}`) && PathPrefix(`/api/webhook/`)"
      - "traefik.http.routers.printerhub-webhooks.entrypoints=websecure"
      - "traefik.http.routers.printerhub-webhooks.tls.certresolver=letsencrypt"
      - "traefik.http.routers.printerhub-webhooks.priority=20"
      - "traefik.http.routers.printerhub-webhooks.service=printerhub"

      - "traefik.http.services.printerhub.loadbalancer.server.port=8080"
      # SSE: disable buffering for live status updates
      - "traefik.http.services.printerhub.loadbalancer.responseforwarding.flushinterval=100ms"

networks:
  traefik:
    external: true
