# ============================================================================
# Label Printer Hub — Pangolin
# Two-container setup: only the frontend is exposed via Pangolin. Backend stays
# on an internal network. Frontend proxies all API calls + SSE to backend.
# Uses Blueprint Labels with the Two-Resources pattern:
# - Main UI behind Pangolin SSO
# - Webhook subroute with auth bypass (uses WEBHOOK_API_KEY instead)
# ============================================================================

services:
  backend:
    image: ghcr.io/strausmann/label-printer-hub-backend:${HUB_VERSION:-latest}
    container_name: label-printer-hub-backend
    user: "1000:1000"
    networks:
      - hub-internal
    expose:
      - "${BACKEND_PORT:-8000}"
    environment:
      - PORT=${BACKEND_PORT:-8000}
      - FORWARDED_ALLOW_IPS=${FORWARDED_ALLOW_IPS:-*}
      - PRINTERS=${PRINTERS}
      - SNMP_COMMUNITY=${SNMP_COMMUNITY:-public}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///data/printer-hub.db}
      - WEBHOOK_API_KEY=${WEBHOOK_API_KEY}
      - UI_BASE_URL=https://${PRINTERHUB_HOST}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:${BACKEND_PORT:-8000}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  frontend:
    image: ghcr.io/strausmann/label-printer-hub-frontend:${HUB_VERSION:-latest}
    container_name: label-printer-hub-frontend
    user: "1000:1000"
    networks:
      - pangolin-newt
      - hub-internal
    environment:
      - PORT=${FRONTEND_PORT:-8080}
      - BACKEND_URL=http://backend:${BACKEND_PORT:-8000}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:${FRONTEND_PORT:-8080}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "pangolin.enable=true"

      # Main UI behind SSO
      - "pangolin.resources.printerhub.protocol=https"
      - "pangolin.resources.printerhub.full-domain=${PRINTERHUB_HOST}"
      - "pangolin.resources.printerhub.port=${FRONTEND_PORT:-8080}"
      - "pangolin.resources.printerhub.auth.sso-enabled=true"

      # Webhook subroute without SSO (Two-Resources pattern)
      - "pangolin.resources.printerhub-webhooks.protocol=https"
      - "pangolin.resources.printerhub-webhooks.full-domain=${PRINTERHUB_HOST}"
      - "pangolin.resources.printerhub-webhooks.path-prefix=/api/webhook/"
      - "pangolin.resources.printerhub-webhooks.port=${FRONTEND_PORT:-8080}"
      - "pangolin.resources.printerhub-webhooks.auth.bypass=true"

networks:
  pangolin-newt:
    external: true
  hub-internal:
    driver: bridge

# After deploy, restart the newt container so blueprint labels are reloaded:
#   docker restart pangolin-newt
