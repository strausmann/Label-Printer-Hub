name: Sync labels

on:
  push:
    branches: [main]
    paths:
      - .github/labels.yml
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  sync:
    name: Sync labels from labels.yml
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Sync labels
        uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: true
          token: ${{ secrets.GITHUB_TOKEN }}
