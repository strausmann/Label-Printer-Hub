name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python — lint, type, test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            pip install -e ".[dev]" || true
          else
            echo "Skipping — no pyproject.toml yet"
            exit 0
          fi

      - name: Ruff lint
        if: hashFiles('pyproject.toml') != ''
        run: ruff check .

      - name: Ruff format check
        if: hashFiles('pyproject.toml') != ''
        run: ruff format --check .

      - name: Mypy
        if: hashFiles('pyproject.toml') != ''
        run: mypy app/ || true   # warn-only until app/ has content

      - name: Tests
        if: hashFiles('pyproject.toml') != ''
        run: pytest --cov=app --cov-report=xml -v

      - name: Upload coverage
        if: always() && hashFiles('coverage.xml') != ''
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  go:
    name: Go — vet, test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Check for Go module
        id: go-check
        run: |
          if [ -f frontend/go.mod ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Go
        if: steps.go-check.outputs.exists == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: stable
          cache-dependency-path: frontend/go.sum

      - name: go vet
        if: steps.go-check.outputs.exists == 'true'
        working-directory: frontend
        run: go vet ./...

      - name: Tests
        if: steps.go-check.outputs.exists == 'true'
        working-directory: frontend
        run: go test -race -coverprofile=coverage.out ./...

  docker-build:
    name: Docker — build smoke test
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check for Dockerfile
        id: docker-check
        run: |
          if [ -f Dockerfile ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build (no push)
        if: steps.docker-check.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: label-printer-hub:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  privacy-scan:
    name: Privacy / secret scan
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for private network artefacts
        run: |
          set +e
          patterns=(
            "172\.16\.[0-9]+\.[0-9]+"
            "192\.168\.[0-9]+\.[0-9]+"
            "10\.[0-9]+\.[0-9]+\.[0-9]+"
            "100\.(6[4-9]|[7-9][0-9]|1[01][0-9]|12[0-7])\."
            "hhdocker"
            "hhplex"
            "strausmann\.cloud"
            "strausmann\.de"
            "strausmann\.net"
            "lager\.strausmann"
          )
          # Allowlist: documentation/RFC ranges and example domains are OK
          allowlist='192\.0\.2\.|198\.51\.100\.|203\.0\.113\.|example\.com|example\.org'

          fail=0
          for p in "${patterns[@]}"; do
            hits=$(git grep -nIE "$p" -- ':!*.md' ':!CLAUDE.md' ':!.github/workflows/ci.yml' ':!.gemini/styleguide.md' ':!.github/copilot-instructions.md' || true)
            if [ -n "$hits" ]; then
              echo "::error title=Private artefact detected::Pattern '$p' matched:"
              echo "$hits"
              fail=1
            fi
          done
          exit $fail
